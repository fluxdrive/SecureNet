# Vault allowlist — machine IDs permitted to unseal.
#
# In production, populate this with the actual /etc/machine-id values of your
# deployment hosts.  In development, use the machine-id of your Docker host or
# the string "dev" (matched by the dev-mode fallback in attestation_verifier).
#
# This file is mounted as a Kubernetes ConfigMap in production.

machine_ids = [
    "dev",
    # Add real machine-ids here, e.g.:
    # "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4",
]
