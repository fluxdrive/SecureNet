# cargo-deny configuration
# Run: cargo deny check
# Or in CI: nix flake check (includes deny via pre-check hook)
#
# Enforces:
# - No dependencies with known CVEs (advisories)
# - No duplicate versions of the same crate (bans)
# - Only approved licenses (licenses)

[graph]
targets = []
all-features = false

# ── Security advisories ────────────────────────────────────────────────────────
[advisories]
version   = 2
db-path   = "~/.cargo/advisory-db"
db-urls   = ["https://github.com/rustsec/advisory-db"]
yanked    = "deny"

# ── License policy ────────────────────────────────────────────────────────────
[licenses]
version          = 2
allow            = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "OpenSSL",
  "Zlib",
]
deny             = []
copyleft         = "warn"
allow-osi-fsf-free = "neither"
default          = "deny"
confidence-threshold = 0.8

# ── Duplicate crate bans ──────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"   # warn rather than deny — some ecosystem churn is unavoidable
wildcards         = "deny"   # no wildcard version requirements
highlight         = "all"

# Known acceptable duplicates in the Rust async ecosystem
skip = [
  # hyper 0.x and 1.x coexist during ecosystem transition
  { name = "hyper" },
  # Multiple versions of syn are common via proc-macro crates
  { name = "syn" },
  { name = "bitflags" },
]

# ── Source policy ─────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
